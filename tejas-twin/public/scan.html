<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Tejas · Scan a machine</title>
<style>
:root{--ai:#2ee6a6;--bad:#ff5468;--accent:#4da3ff;--ink:#eaf1fb;--dim:#9fb0c8}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#04060c;color:var(--ink);overflow:hidden;user-select:none;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif}
#stage{position:fixed;inset:0}
video,#sim{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#sim{display:none;background:radial-gradient(120% 80% at 50% 30%,#16243f,#070b14 70%)}
#sim .machine{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);width:150px;height:150px;
  border-radius:16px;background:linear-gradient(#1a2740,#0e1626);box-shadow:inset 0 0 22px #000}
#sim .machine::after{content:"";position:absolute;inset:30px;border-radius:50%;border:6px solid #2b3b66;
  border-top-color:#4da3ff;animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.simtag{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--dim);
  background:rgba(0,0,0,.4);padding:3px 9px;border-radius:999px}
.topbar{position:absolute;top:0;left:0;right:0;z-index:8;display:flex;align-items:center;gap:9px;padding:12px 14px;
  background:linear-gradient(180deg,rgba(4,6,12,.85),transparent)}
.logo{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:15px;
  background:linear-gradient(135deg,#1b6,#093);box-shadow:0 0 14px rgba(46,230,166,.5)}
.tb b{font-size:13px;letter-spacing:.1em}.tb span{display:block;font-size:9.5px;color:var(--dim)}
.rec{margin-left:auto;display:none;align-items:center;gap:6px;font-size:12px;font-weight:800;color:var(--bad)}
.rec .rdot{width:10px;height:10px;border-radius:50%;background:var(--bad);box-shadow:0 0 10px var(--bad);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.3}}
/* capture reticle */
.frame{position:absolute;inset:14% 12% 24%;z-index:6;border:2px dashed rgba(46,230,166,.5);border-radius:18px;display:none}
.frame::before,.frame::after{content:"";position:absolute;width:22px;height:22px;border:3px solid var(--ai)}
.frame::before{top:-2px;left:-2px;border-right:0;border-bottom:0}.frame::after{bottom:-2px;right:-2px;border-left:0;border-top:0}
.ring{position:absolute;top:50%;left:50%;width:120px;height:120px;transform:translate(-50%,-50%);z-index:6;display:none}
.ring svg{transform:rotate(-90deg)}
.guide{position:absolute;left:0;right:0;bottom:130px;z-index:7;text-align:center;font-size:15px;font-weight:600;
  text-shadow:0 1px 6px #000;display:none}
.card{position:absolute;left:12px;right:12px;bottom:14px;z-index:9;border-radius:16px;padding:16px;
  background:rgba(8,13,24,.94);border:1px solid rgba(46,230,166,.3);backdrop-filter:blur(10px);box-shadow:0 16px 50px rgba(0,0,0,.6)}
.card h3{margin:0 0 5px;font-size:17px}.card .sub{font-size:12.5px;color:var(--dim);line-height:1.5}
.name-input{width:100%;margin-top:12px;padding:11px 12px;border-radius:11px;border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.3);color:var(--ink);font-size:14px;outline:none}
.btn{display:block;width:100%;margin-top:12px;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:800;
  cursor:pointer;background:linear-gradient(135deg,#19c6ff,#2ee6a6);color:#04120b}
.btn[disabled]{opacity:.55}
.prog{height:7px;border-radius:7px;background:rgba(255,255,255,.1);overflow:hidden;margin:12px 0 4px}
.prog>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#4da3ff,#2ee6a6);transition:width .12s}
.words{font-family:ui-monospace,monospace;font-size:11px;color:var(--accent);min-height:15px}
.done .big{font-size:60px;text-align:center;animation:pop .5s}
@keyframes pop{0%{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="stage">
  <video id="video" playsinline muted></video>
  <div id="sim"><div class="machine"></div><div class="simtag">SIMULATED CAMERA · enable HTTPS for live camera</div></div>

  <div class="frame" id="frame"></div>
  <div class="ring" id="ring">
    <svg width="120" height="120"><circle cx="60" cy="60" r="54" stroke="rgba(255,255,255,.15)" stroke-width="6" fill="none"/>
      <circle id="ringArc" cx="60" cy="60" r="54" stroke="#2ee6a6" stroke-width="6" fill="none" stroke-linecap="round"
        stroke-dasharray="339" stroke-dashoffset="339"/></svg>
  </div>
  <div class="guide" id="guide"></div>

  <div class="topbar">
    <div class="logo">⚡</div>
    <div class="tb"><b>TEJAS&nbsp;SCAN</b><span>build a twin from video</span></div>
    <div class="rec" id="rec"><span class="rdot"></span><span id="recT">0s</span></div>
  </div>

  <div class="card" id="card">
    <h3 id="cTitle">Scan a machine</h3>
    <div class="sub" id="cSub">Record a slow walk-around of the machine. Tejas AI reconstructs it into a controllable digital twin on your dashboard.</div>
    <div id="cBody"><input class="name-input" id="mName" type="text" placeholder="Name the machine (e.g. Pump A · Line 2)" /></div>
    <button class="btn" id="cBtn">● Start scanning</button>
  </div>
</div>
<script src="scan.js"></script>
</body>
</html>
